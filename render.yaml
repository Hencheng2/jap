services:
  - type: web
    name: henai-assistant
    runtime: python
    repo: https://github.com/YOUR_USERNAME/henai-app
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OPENROUTER_API_KEY
        sync: false
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -k eventlet -w 1
