<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HenAi | Japanese Learning Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Main Container */
        .app-container {
            width: 100%;
            max-width: 1400px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 20px 28px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ff6a00, #ee0979);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 12px rgba(238, 9, 121, 0.3);
        }

        .logo-area h1 {
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #a8c0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-area span {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            margin-left: 8px;
        }

        /* Mode Toggle */
        .mode-toggle {
            display: flex;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 60px;
            padding: 4px;
            gap: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .mode-btn {
            padding: 10px 24px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #ff6a00, #ee0979);
            color: white;
            box-shadow: 0 2px 8px rgba(238, 9, 121, 0.4);
        }

        .mode-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        /* Japanese mode indicator */
        .japanese-badge {
            background: rgba(255, 107, 0, 0.2);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            border-left: 2px solid #ff6a00;
        }

        /* Main Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Custom Scrollbar */
        .chat-area::-webkit-scrollbar {
            width: 6px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        /* Message Bubbles */
        .message {
            display: flex;
            gap: 14px;
            animation: fadeInUp 0.3s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .assistant .avatar {
            background: linear-gradient(135deg, #ff6a00, #ee0979);
            box-shadow: 0 4px 12px rgba(238, 9, 121, 0.2);
        }

        .user .avatar {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .bubble {
            max-width: 70%;
            padding: 14px 20px;
            border-radius: 24px;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .user .bubble {
            background: linear-gradient(135deg, #ff6a00, #ee0979);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .assistant .bubble {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            border-bottom-left-radius: 6px;
        }

        /* Input Area */
        .input-area {
            padding: 20px 28px 28px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 28px;
            padding: 8px 8px 8px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #ff6a00;
            box-shadow: 0 0 0 2px rgba(255, 107, 0, 0.2);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 0.95rem;
            font-family: inherit;
            resize: none;
            padding: 12px 0;
            max-height: 120px;
            outline: none;
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            width: 44px;
            height: 44px;
            border-radius: 30px;
            border: none;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
        }

        .action-btn.record {
            background: linear-gradient(135deg, #ff6a00, #ee0979);
        }

        .action-btn.record.recording {
            animation: pulse 1.2s infinite;
            box-shadow: 0 0 0 0 rgba(238, 9, 121, 0.7);
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(238, 9, 121, 0.7);
            }
            70% {
                box-shadow: 0 0 0 12px rgba(238, 9, 121, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(238, 9, 121, 0);
            }
        }

        .send-btn {
            background: linear-gradient(135deg, #ff6a00, #ee0979);
            width: 44px;
            height: 44px;
            border-radius: 30px;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(238, 9, 121, 0.4);
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.1s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.2s;
        }

        @keyframes bounce {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-8px);
            }
        }

        /* TTS Play Button on Messages */
        .play-tts {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 14px;
            margin-left: 12px;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .play-tts:hover {
            color: #ff6a00;
        }

        /* Loading and status indicators */
        .status-indicator {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 107, 0, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
        }

        .status-indicator .dot {
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app-container {
                height: 95vh;
                border-radius: 24px;
            }
            
            .bubble {
                max-width: 85%;
            }
            
            .header {
                padding: 14px 20px;
            }
            
            .chat-area {
                padding: 16px 20px;
            }
            
            .input-area {
                padding: 16px 20px 24px;
            }

            .status-indicator {
                bottom: 80px;
                font-size: 12px;
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="logo-area">
                <div class="logo">🐔</div>
                <h1>HenAi <span>Japanese Assistant</span></h1>
            </div>
            <div style="display: flex; gap: 12px; align-items: center;">
                <div class="mode-toggle">
                    <button class="mode-btn" data-mode="normal">💬 Normal</button>
                    <button class="mode-btn active" data-mode="japanese">🇯🇵 日本語のみ</button>
                </div>
                <div class="japanese-badge" id="modeBadge">📢 日本語のみ返答</div>
            </div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message assistant">
                <div class="avatar">🐔</div>
                <div class="bubble">
                    こんにちは！私はHenAiです。🇯🇵<br>
                    私は日本語のみで返答します。英語、スワヒリ語、どんな言語で話しかけても大丈夫です！<br>
                    さあ、日本語で会話を始めましょう！😊
                    <button class="play-tts" onclick="speakText('こんにちは！私はHenAiです。私は日本語のみで返答します。英語、スワヒリ語、どんな言語で話しかけても大丈夫です！さあ、日本語で会話を始めましょう！')">🔊</button>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="messageInput" rows="1" placeholder="Type your message in any language... (English, Kiswahili, 日本語)"></textarea>
                <div class="action-buttons">
                    <button class="action-btn" id="voiceBtn" title="Voice Input">🎤</button>
                    <button class="send-btn" id="sendBtn">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // HenAi - Japanese Learning Assistant
        // HTTP-based implementation (no WebSockets)
        // ============================================
        
        // State variables
        let currentMode = 'japanese';
        let sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        let isRecording = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let currentAudio = null;
        
        // DOM Elements
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const voiceBtn = document.getElementById('voiceBtn');
        const modeBadge = document.getElementById('modeBadge');
        
        // Helper: Show status message
        function showStatus(message, isError = false) {
            let statusDiv = document.querySelector('.status-indicator');
            if (!statusDiv) {
                statusDiv = document.createElement('div');
                statusDiv.className = 'status-indicator';
                document.body.appendChild(statusDiv);
            }
            
            statusDiv.innerHTML = `
                ${!isError ? '<span class="dot"></span>' : '⚠️'}
                <span>${message}</span>
            `;
            statusDiv.style.borderColor = isError ? '#ff4444' : 'rgba(255, 107, 0, 0.3)';
            statusDiv.style.background = isError ? 'rgba(0, 0, 0, 0.9)' : 'rgba(0, 0, 0, 0.85)';
            
            setTimeout(() => {
                if (statusDiv && statusDiv.parentNode) {
                    statusDiv.remove();
                }
            }, 3000);
        }
        
        // Send message to backend via HTTP POST
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            // Add user message to chat
            addMessage(message, 'user');
            messageInput.value = '';
            autoResizeTextarea();
            
            // Show typing indicator
            showTypingIndicator();
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId,
                        mode: currentMode
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                hideTypingIndicator();
                
                if (data.response) {
                    addMessage(data.response, 'assistant');
                    
                    // Auto-speak Japanese responses in Japanese mode
                    if (currentMode === 'japanese') {
                        await speakText(data.response);
                    }
                } else if (data.error) {
                    addMessage('申し訳ありません: ' + data.error, 'assistant');
                    showStatus('Error: ' + data.error, true);
                }
            } catch (error) {
                hideTypingIndicator();
                console.error('Chat error:', error);
                addMessage('申し訳ありません。通信エラーが発生しました。もう一度お試しください。', 'assistant');
                showStatus('Connection error. Please check if the server is running.', true);
            }
        }
        
        // Add message to chat with proper formatting
        function addMessage(content, role) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = role === 'user' ? '👤' : '🐔';
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            
            // Parse content for line breaks and handle text
            bubble.innerHTML = escapeHtml(content).replace(/\n/g, '<br>');
            
            // Add TTS button for assistant messages (always add, but only show in Japanese mode or for manual playback)
            if (role === 'assistant') {
                const ttsBtn = document.createElement('button');
                ttsBtn.className = 'play-tts';
                ttsBtn.innerHTML = '🔊';
                ttsBtn.title = 'Play audio';
                ttsBtn.onclick = (e) => {
                    e.stopPropagation();
                    speakText(content);
                };
                bubble.appendChild(ttsBtn);
            }
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);
            
            chatArea.appendChild(messageDiv);
            scrollToBottom();
        }
        
        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Typing indicator management
        let typingDiv = null;
        function showTypingIndicator() {
            if (typingDiv) return;
            typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="avatar">🐔</div>
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatArea.appendChild(typingDiv);
            scrollToBottom();
        }
        
        function hideTypingIndicator() {
            if (typingDiv) {
                typingDiv.remove();
                typingDiv = null;
            }
        }
        
        // Text-to-Speech using HTTP backend
        async function speakText(text) {
            // Stop any currently playing audio
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            
            try {
                showStatus('🎵 Generating speech...');
                const response = await fetch('/api/tts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                
                if (!response.ok) {
                    throw new Error(`TTS HTTP ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.audio) {
                    playAudio(data.audio);
                } else if (data.error) {
                    console.error('TTS error:', data.error);
                    fallbackTTS(text);
                }
            } catch (error) {
                console.error('TTS error:', error);
                fallbackTTS(text);
            }
        }
        
        function fallbackTTS(text) {
            showStatus('Using browser TTS fallback...');
            // Fallback browser TTS
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ja-JP';
            utterance.rate = 0.9;
            utterance.onend = () => showStatus('✓ Done', false);
            utterance.onerror = () => showStatus('TTS failed', true);
            window.speechSynthesis.speak(utterance);
        }
        
        function playAudio(base64Audio) {
            try {
                const audio = new Audio('data:audio/mp3;base64,' + base64Audio);
                currentAudio = audio;
                audio.onplay = () => showStatus('🔊 Playing...');
                audio.onended = () => {
                    currentAudio = null;
                    showStatus('✓', false);
                };
                audio.onerror = (e) => {
                    console.error('Audio playback error:', e);
                    showStatus('Audio playback failed', true);
                    currentAudio = null;
                };
                audio.play().catch(e => {
                    console.error('Audio play error:', e);
                    showStatus('Cannot play audio', true);
                });
            } catch (e) {
                console.error('Audio creation error:', e);
                showStatus('Audio error', true);
            }
        }
        
        // Voice Recording using HTTP POST
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };
                
                mediaRecorder.onstop = async () => {
                    if (audioChunks.length === 0) {
                        showStatus('No audio recorded', true);
                        stream.getTracks().forEach(track => track.stop());
                        return;
                    }
                    
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const formData = new FormData();
                    formData.append('audio', audioBlob, 'recording.webm');
                    
                    showStatus('🎤 Processing speech...');
                    
                    try {
                        const response = await fetch('/api/stt', {
                            method: 'POST',
                            body: formData
                        });
                        
                        const data = await response.json();
                        
                        if (data.success && data.text) {
                            messageInput.value = data.text;
                            showStatus(`✓ Recognized: "${data.text}"`);
                            await sendMessage();
                        } else {
                            showStatus('Could not recognize speech. Please try again.', true);
                        }
                    } catch (error) {
                        console.error('STT error:', error);
                        showStatus('Speech recognition failed. Please type your message.', true);
                    }
                    
                    stream.getTracks().forEach(track => track.stop());
                };
                
                mediaRecorder.start(100);
                isRecording = true;
                voiceBtn.classList.add('recording');
                voiceBtn.innerHTML = '⏹️';
                showStatus('🎙️ Recording... Click mic again to stop');
                
                // Auto-stop after 10 seconds
                const autoStopTimeout = setTimeout(() => {
                    if (isRecording) {
                        stopRecording();
                    }
                }, 10000);
                
                // Store timeout to clear if stopped manually
                mediaRecorder._autoStopTimeout = autoStopTimeout;
                
            } catch (error) {
                console.error('Microphone error:', error);
                showStatus('Microphone access denied. Please check permissions.', true);
            }
        }
        
        function stopRecording() {
            if (mediaRecorder && isRecording && mediaRecorder.state === 'recording') {
                if (mediaRecorder._autoStopTimeout) {
                    clearTimeout(mediaRecorder._autoStopTimeout);
                }
                mediaRecorder.stop();
                isRecording = false;
                voiceBtn.classList.remove('recording');
                voiceBtn.innerHTML = '🎤';
            }
        }
        
        function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }
        
        // Auto-resize textarea
        function autoResizeTextarea() {
            messageInput.style.height = 'auto';
            const newHeight = Math.min(messageInput.scrollHeight, 120);
            messageInput.style.height = newHeight + 'px';
        }
        
        // Scroll to bottom of chat
        function scrollToBottom() {
            requestAnimationFrame(() => {
                chatArea.scrollTop = chatArea.scrollHeight;
            });
        }
        
        // Mode switching
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                if (btn.dataset.mode === mode) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            if (mode === 'japanese') {
                modeBadge.innerHTML = '🇯🇵 日本語のみ返答';
                modeBadge.style.borderLeftColor = '#ff6a00';
                addMessage('🇯🇵 日本語モードが有効になりました。これからはどんな言語で話しかけても、日本語で返答します。', 'assistant');
            } else {
                modeBadge.innerHTML = '💬 通常モード (多言語)';
                modeBadge.style.borderLeftColor = '#555';
                addMessage('💬 Normal mode enabled. I will respond in your language.', 'assistant');
            }
        }
        
        // Check server health on load
        async function checkServerHealth() {
            try {
                const response = await fetch('/health');
                if (response.ok) {
                    console.log('Server is healthy');
                } else {
                    showStatus('Server connection OK but health check failed', true);
                }
            } catch (error) {
                console.warn('Server health check failed:', error);
                showStatus('Connected to server', false);
            }
        }
        
        // Event Listeners
        sendBtn.addEventListener('click', sendMessage);
        voiceBtn.addEventListener('click', toggleRecording);
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        messageInput.addEventListener('input', autoResizeTextarea);
        
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => setMode(btn.dataset.mode));
        });
        
        // Clean up on page unload
        window.addEventListener('beforeunload', () => {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
            }
            if (currentAudio) {
                currentAudio.pause();
            }
        });
        
        // Initialize
        autoResizeTextarea();
        checkServerHealth();
        
        console.log('HenAi initialized with session ID:', sessionId);
    </script>
</body>
</html>
